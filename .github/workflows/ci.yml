name: Security CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Secret Scanning — Gitleaks
  # Prevents secrets, API keys and passwords from
  # being committed to the repository
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 2: SAST — Backend ESLint Security Plugin
  # Static analysis of Node.js/Express source code
  # for common security vulnerabilities
  # ─────────────────────────────────────────────
  sast-backend:
    name: SAST — Backend (ESLint Security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint security scan
        run: npx eslint src/ --max-warnings=0

  # ─────────────────────────────────────────────
  # JOB 3: SAST — Frontend ESLint
  # Static analysis of React source code
  # ─────────────────────────────────────────────
  sast-frontend:
    name: SAST — Frontend (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 4: SCA — npm audit
  # Software Composition Analysis: checks all
  # third-party dependencies for known CVEs
  # ─────────────────────────────────────────────
  sca-audit:
    name: SCA — Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────
  # JOB 5: SAST — GitHub CodeQL
  # Advanced semantic code analysis for security
  # vulnerabilities across the full codebase
  # ─────────────────────────────────────────────
  codeql:
    name: SAST — CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript'

  # ─────────────────────────────────────────────
  # JOB 6: Build Verification
  # Confirms the React frontend builds successfully
  # before any deployment
  # ─────────────────────────────────────────────
  build:
    name: Build Verification (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://localhost:5000/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 7: DAST — OWASP ZAP Baseline Scan
  # Dynamic Application Security Testing:
  # scans the running app for OWASP Top 10 issues
  # Runs against the deployed frontend URL
  # continue-on-error: true — does not block merge
  # ─────────────────────────────────────────────
  dast:
    name: DAST — OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://ll-oyiso.github.io/Customer-Payments-Portal'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
